name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Ensure Env Files Are Not Tracked
        run: |
          tracked_env="$(git ls-files | grep -E '(^|/)\.env($|\\.)' || true)"
          if [ -n "$tracked_env" ]; then
            echo "Tracked environment files detected:"
            echo "$tracked_env"
            exit 1
          fi

      - name: Install Dependencies
        run: npm ci

      - name: Install Functions Dependencies for Shared Tests
        run: npm ci --prefix functions

      - name: Lint (Non-Blocking)
        continue-on-error: true
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npm run test -- --run

      - name: Build
        run: npm run build
        env:
          VITE_DEMO_MODE: '1'

  functions:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    needs: [web, functions]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_DEMO_MODE: '1'

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
